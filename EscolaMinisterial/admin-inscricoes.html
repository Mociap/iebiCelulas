    <style>

    <script>
        // Configuração do Firebase
        const configuracaoFirebase = {
            apiKey: "AIzaSyCEqseDS-_OSmdfGf-NNflAJnS_AT5i1-U",
            authDomain: "dbiebi.firebaseapp.com",
            databaseURL: "https://dbiebi-default-rtdb.firebaseio.com",
            projectId: "dbiebi",
            storageBucket: "dbiebi.appspot.com",
            messagingSenderId: "1068164821081",
            appId: "1:1068164821081:web:2d3e0030d5311d94f30148"
        };
        firebase.initializeApp(configuracaoFirebase);
        const db = firebase.firestore();

        // Estado da Aplicação
        const state = {
            dadosOriginais: [], // Dados brutos do Firestore (filtrados por turma/disciplina)
            dadosFiltrados: [], // Dados após filtro local (nome/célula) e ordenação
            paginacao: {
                paginaAtual: 1,
                itensPorPagina: 50,
                totalPaginas: 1
            },
            ordenacao: {
                coluna: 'nome',
                direcao: 'asc'
            },
            filtrosServidor: {
                turma: '',
                disciplina: ''
            },
            dadosTurmas: [] // Armazenar dados das turmas para filtro dinâmico
        };

        // Função Debounce para otimizar busca
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        // Buscar dados do Firestore
        function buscarDados(forcarRecarregamento = false) {
            const turma = document.getElementById('filtroTurma').value;
            const disciplina = document.getElementById('filtroDisciplina').value;
            
            // Verificar se filtros de servidor mudaram
            if (!forcarRecarregamento && 
                turma === state.filtrosServidor.turma && 
                disciplina === state.filtrosServidor.disciplina && 
                state.dadosOriginais.length > 0) {
                aplicarFiltrosLocais(); // Apenas re-filtra localmente
                return;
            }

            state.filtrosServidor = { turma, disciplina };
            
            const tbody = document.getElementById('listaInscricoes');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center"><div class="loader"></div><p>Carregando inscrições...</p></td></tr>';
            
            let query = db.collection('cursosInscricoes');

            if (turma) query = query.where('turma', '==', turma);
            if (disciplina) query = query.where('disciplina', '==', disciplina);

            query.get().then(snapshot => {
                state.dadosOriginais = [];
                snapshot.forEach(doc => {
                    const d = doc.data();
                    d.id = doc.id;
                    state.dadosOriginais.push(d);
                });
                
                aplicarFiltrosLocais();
                
            }).catch(error => {
                console.error("Erro ao carregar:", error);
                Swal.fire('Erro', 'Erro ao carregar dados: ' + error.message, 'error');
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Erro ao carregar dados.</td></tr>';
            });
        }

        // Aplicar filtros locais (Nome e Célula)
        function aplicarFiltrosLocais() {
            const nome = document.getElementById('filtroNome').value.toLowerCase();
            const celula = document.getElementById('filtroCelula').value.toLowerCase();

            state.dadosFiltrados = state.dadosOriginais.filter(d => {
                const matchNome = !nome || (d.nome && d.nome.toLowerCase().includes(nome));
                const matchCelula = !celula || (d.celula && d.celula.toLowerCase().includes(celula));
                return matchNome && matchCelula;
            });

            ordenarDados();
        }

        // Ordenar dados
        function ordenarDados() {
            const { coluna, direcao } = state.ordenacao;

            state.dadosFiltrados.sort((a, b) => {
                let valA = a[coluna] || '';
                let valB = b[coluna] || '';

                if (coluna === 'dataInscricao') {
                    valA = valA.seconds || 0;
                    valB = valB.seconds || 0;
                } else {
                    valA = valA.toString().toLowerCase();
                    valB = valB.toString().toLowerCase();
                }

                if (valA < valB) return direcao === 'asc' ? -1 : 1;
                if (valA > valB) return direcao === 'asc' ? 1 : -1;
                return 0;
            });

            atualizarIconesOrdenacao();
            state.paginacao.paginaAtual = 1; // Resetar para primeira página ao reordenar/filtrar
            renderizarPagina();
        }

        // Renderizar página atual
        function renderizarPagina() {
            const totalItens = state.dadosFiltrados.length;
            state.paginacao.totalPaginas = Math.ceil(totalItens / state.paginacao.itensPorPagina) || 1;
            
            // Ajustar página atual se necessário
            if (state.paginacao.paginaAtual > state.paginacao.totalPaginas) {
                state.paginacao.paginaAtual = state.paginacao.totalPaginas;
            }
            if (state.paginacao.paginaAtual < 1) state.paginacao.paginaAtual = 1;

            const inicio = (state.paginacao.paginaAtual - 1) * state.paginacao.itensPorPagina;
            const fim = inicio + state.paginacao.itensPorPagina;
            const dadosPagina = state.dadosFiltrados.slice(inicio, fim);

            renderizarTabela(dadosPagina);
            atualizarControlesPaginacao(totalItens, inicio, fim);
        }

        function renderizarTabela(dados) {
            const tbody = document.getElementById('listaInscricoes');
            const contador = document.getElementById('contadorRegistros');

            tbody.innerHTML = '';
            
            if (state.dadosFiltrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><i class="fas fa-inbox fa-3x text-muted mb-3"></i><p class="text-muted">Nenhuma inscrição encontrada</p></td></tr>';
                contador.textContent = 'Nenhum registro encontrado';
                document.getElementById('paginationControls').style.display = 'none';
                return;
            }

            contador.textContent = `Total de registros: ${state.dadosFiltrados.length}`;
            document.getElementById('paginationControls').style.display = 'flex';

            dados.forEach(inscricao => {
                const dataInscricao = inscricao.dataInscricao ?
                    new Date(inscricao.dataInscricao.seconds * 1000).toLocaleDateString() :
                    '-';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-weight-bold text-dark">${inscricao.nome}</td>
                    <td>${inscricao.celula}</td>
                    <td><span class="badge badge-info">${inscricao.turma}</span></td>
                    <td>${inscricao.disciplina}</td>
                    <td>${dataInscricao}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-primary editar-inscricao shadow-sm" data-id="${inscricao.id}" title="Editar">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger excluir-inscricao shadow-sm ml-1" data-id="${inscricao.id}" data-nome="${inscricao.nome}" title="Excluir">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            adicionarEventListeners();
        }

        function atualizarControlesPaginacao(total, inicio, fim) {
            document.getElementById('pageStart').textContent = total === 0 ? 0 : inicio + 1;
            document.getElementById('pageEnd').textContent = Math.min(fim, total);
            document.getElementById('totalItems').textContent = total;
            document.getElementById('pageIndicator').textContent = `Página ${state.paginacao.paginaAtual} de ${state.paginacao.totalPaginas}`;

            document.getElementById('btnPrevPage').disabled = state.paginacao.paginaAtual === 1;
            document.getElementById('btnNextPage').disabled = state.paginacao.paginaAtual === state.paginacao.totalPaginas;
        }

        function atualizarIconesOrdenacao() {
            document.querySelectorAll('th.sortable i.fa-sort, th.sortable i.fa-sort-up, th.sortable i.fa-sort-down').forEach(icon => {
                icon.className = 'fas fa-sort ml-1 text-muted';
            });

            const thAtual = document.querySelector(`th[data-sort="${state.ordenacao.coluna}"]`);
            if (thAtual) {
                const icon = thAtual.querySelector('i:last-child');
                icon.className = `fas fa-sort-${state.ordenacao.direcao === 'asc' ? 'up' : 'down'} ml-1 text-white`;
            }
        }

        // Carregar filtros (Turmas e Disciplinas)
        function carregarFiltros() {
            // Carregar turmas e disciplinas
            db.collection('cursosTurmas').get().then(snapshot => {
                state.dadosTurmas = [];
                snapshot.forEach(doc => {
                    const d = doc.data();
                    state.dadosTurmas.push(d);
                });

                // Preencher Select de Turmas
                const turmas = [...new Set(state.dadosTurmas.map(d => d.nomeTurma))].sort((a, b) => b.localeCompare(a));
                
                const selectTurma = document.getElementById('filtroTurma');
                selectTurma.innerHTML = '<option value="">Todas as Turmas</option>';
                
                turmas.forEach(turma => {
                    const option = document.createElement('option');
                    option.value = turma;
                    option.textContent = turma;
                    selectTurma.appendChild(option);
                });

                if (turmas.length > 0) {
                    selectTurma.value = turmas[0]; // Selecionar primeira turma
                    atualizarSelectDisciplinas(); // Atualizar disciplinas com base na turma
                    buscarDados(); // Carregar inicial
                } else {
                    buscarDados();
                }
            });
        }

        // Atualizar Select de Disciplinas com base na Turma selecionada
        function atualizarSelectDisciplinas() {
            const turmaSelecionada = document.getElementById('filtroTurma').value;
            const selectDisciplina = document.getElementById('filtroDisciplina');
            
            // Guardar valor atual se possível
            const valorAtual = selectDisciplina.value;

            selectDisciplina.innerHTML = '<option value="">Todas as Disciplinas</option>';
            
            const disciplinas = new Set();
            
            state.dadosTurmas.forEach(d => {
                if (!turmaSelecionada || d.nomeTurma === turmaSelecionada) {
                    if (d.disciplinas) disciplinas.add(d.disciplinas);
                }
            });

            // Ordenar e preencher
            [...disciplinas].sort().forEach(disc => {
                const option = document.createElement('option');
                option.value = disc;
                option.textContent = disc;
                selectDisciplina.appendChild(option);
            });

            // Tentar restaurar valor selecionado se ainda existir na lista
            // Mas se a turma mudou, geralmente queremos resetar a disciplina, exceto se for "Todas"
            // No caso de carregamento inicial ou mudança de turma, o ideal é resetar para ""
            // Se o usuário mudou a turma, valorAtual provavelmente não faz sentido na nova turma (a menos que nomes coincidam)
            // Vamos resetar para "" sempre que a lista for reconstruída, a menos que seja a mesma lista (mas aqui estamos reconstruindo)
            // Mas se a função for chamada sem mudar a turma (ex: init), ok.
            // Simplificação: resetar sempre que atualizar a lista, pois o contexto mudou.
            selectDisciplina.value = "";
        }

        function exportarParaExcel() {
            // Exportar TODOS os dados filtrados, não apenas a página atual
            if (state.dadosFiltrados.length === 0) {
                Swal.fire('Aviso', 'Não há dados para exportar.', 'warning');
                return;
            }

            const dadosParaExportar = state.dadosFiltrados.map(d => ({
                Nome: d.nome,
                Célula: d.celula,
                Turma: d.turma,
                Disciplina: d.disciplina,
                Data: d.dataInscricao ? new Date(d.dataInscricao.seconds * 1000).toLocaleDateString() : '-'
            }));

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(dadosParaExportar);
            XLSX.utils.book_append_sheet(wb, ws, "Inscrições");
            XLSX.writeFile(wb, `Inscricoes_EM_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // Funções de Modal e Edição
        function abrirModalEdicao(id) {
            const modalElement = document.getElementById('modalEdicao');
            document.getElementById('formEdicao').reset();
            document.getElementById('inscricaoId').value = id;

            // Buscar dados do cache se possível, ou do Firestore
            const itemCache = state.dadosOriginais.find(d => d.id === id);
            
            if (itemCache) {
                preencherModalEdicao(itemCache);
                $('#modalEdicao').modal('show');
            } else {
                db.collection('cursosInscricoes').doc(id).get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        data.id = doc.id;
                        preencherModalEdicao(data);
                        $('#modalEdicao').modal('show');
                    }
                }).catch(err => {
                    Swal.fire('Erro', 'Erro ao carregar dados: ' + err.message, 'error');
                });
            }
        }

        function preencherModalEdicao(data) {
            document.getElementById('editNome').value = data.nome;
            document.getElementById('editCelula').value = data.celula;

            const selectTurma = document.getElementById('editTurma');
            selectTurma.innerHTML = '<option>Carregando...</option>';
            
            db.collection('cursosTurmas').get().then(snap => {
                selectTurma.innerHTML = '';
                const turmas = new Set();
                snap.forEach(d => turmas.add(d.data().nomeTurma));
                
                turmas.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    opt.selected = t === data.turma;
                    selectTurma.appendChild(opt);
                });

                carregarDisciplinasParaTurma(data.turma, data.disciplina);
            });
        }

        function carregarDisciplinasParaTurma(turma, disciplinaAtual = null) {
            const select = document.getElementById('editDisciplina');
            select.innerHTML = '<option>Carregando...</option>';

            db.collection('cursosTurmas')
                .where('nomeTurma', '==', turma)
                .get()
                .then(snap => {
                    select.innerHTML = '';
                    const disciplinas = new Set();
                    snap.forEach(d => disciplinas.add(d.data().disciplinas));

                    disciplinas.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d;
                        opt.textContent = d;
                        if (disciplinaAtual && d === disciplinaAtual) opt.selected = true;
                        select.appendChild(opt);
                    });
                });
        }

        function salvarEdicao() {
            const id = document.getElementById('inscricaoId').value;
            const nome = document.getElementById('editNome').value;
            const celula = document.getElementById('editCelula').value;
            const turma = document.getElementById('editTurma').value;
            const disciplina = document.getElementById('editDisciplina').value;

            if (!nome || !celula || !turma || !disciplina) {
                Swal.fire('Atenção', 'Preencha todos os campos.', 'warning');
                return;
            }

            Swal.fire({
                html: `Deseja atualizar os dados de <b>${nome}</b>?`,
                showCancelButton: true,
                confirmButtonColor: '#2980b9',
                cancelButtonColor: '#7f8c8d',
                confirmButtonText: 'Sim, salvar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    const btn = document.getElementById('btnSalvarEdicao');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Salvando...';
                    btn.disabled = true;

                    db.collection('cursosInscricoes').doc(id).update({
                        nome, celula, turma, disciplina,
                        dataAtualizacao: new Date()
                    }).then(() => {
                        $('#modalEdicao').modal('hide');
                        Swal.fire({
                            title: 'Atualizado!',
                            text: 'Os dados da inscrição foram salvos com sucesso.',
                            icon: 'success',
                            confirmButtonColor: '#27ae60',
                            timer: 2000,
                            showConfirmButton: false
                        });
                        buscarDados(true); // Forçar recarregamento para atualizar dados
                    }).catch(err => {
                        Swal.fire('Erro', 'Erro ao salvar: ' + err.message, 'error');
                    }).finally(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
                }
            });
        }

        function confirmarExclusao(id, nome) {
            Swal.fire({
                html: `Deseja excluir a inscrição de <b>${nome}</b>?`,
                showCancelButton: true,
                confirmButtonColor: '#c0392b',
                cancelButtonColor: '#7f8c8d',
                confirmButtonText: 'Sim, excluir',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Excluindo...',
                        html: 'Aguarde um momento.',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    db.collection('cursosInscricoes').doc(id).delete().then(() => {
                        Swal.fire({
                            title: 'Excluído!',
                            text: 'A inscrição foi removida com sucesso.',
                            icon: 'success',
                            showConfirmButton: false,
                            timer: 2000
                        });
                        buscarDados(true);
                    }).catch(err => {
                        Swal.fire('Erro', 'Erro ao excluir: ' + err.message, 'error');
                    });
                }
            });
        }

        function adicionarEventListeners() {
            document.querySelectorAll('.editar-inscricao').forEach(btn => {
                btn.addEventListener('click', () => abrirModalEdicao(btn.dataset.id));
            });
            document.querySelectorAll('.excluir-inscricao').forEach(btn => {
                btn.addEventListener('click', () => confirmarExclusao(btn.dataset.id, btn.dataset.nome));
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarFiltros();

            // Event Listeners de Filtros
            document.getElementById('filtroTurma').addEventListener('change', () => {
                atualizarSelectDisciplinas();
                buscarDados(false);
            });
            document.getElementById('filtroDisciplina').addEventListener('change', () => buscarDados(false));
            
            // Debounce para filtros de texto
            const debouncedFiltroLocal = debounce(aplicarFiltrosLocais, 300);
            ['filtroNome', 'filtroCelula'].forEach(id => {
                document.getElementById(id).addEventListener('input', debouncedFiltroLocal);
            });

            // Botões fixos
            document.getElementById('btnExportar').addEventListener('click', exportarParaExcel);
            document.getElementById('btnSalvarEdicao').addEventListener('click', salvarEdicao);
            // document.getElementById('btnRecarregar').addEventListener('click', () => buscarDados(true));
            
            document.getElementById('editTurma').addEventListener('change', function() {
                carregarDisciplinasParaTurma(this.value);
            });

            // Ordenação
            document.querySelectorAll('th.sortable').forEach(th => {
                th.addEventListener('click', () => {
                    const coluna = th.dataset.sort;
                    if (state.ordenacao.coluna === coluna) {
                        state.ordenacao.direcao = state.ordenacao.direcao === 'asc' ? 'desc' : 'asc';
                    } else {
                        state.ordenacao.coluna = coluna;
                        state.ordenacao.direcao = 'asc';
                    }
                    ordenarDados();
                });
            });

            // Paginação
            document.getElementById('btnPrevPage').addEventListener('click', () => {
                if (state.paginacao.paginaAtual > 1) {
                    state.paginacao.paginaAtual--;
                    renderizarPagina();
                }
            });
            document.getElementById('btnNextPage').addEventListener('click', () => {
                if (state.paginacao.paginaAtual < state.paginacao.totalPaginas) {
                    state.paginacao.paginaAtual++;
                    renderizarPagina();
                }
            });
        });
    </script>
</body>
